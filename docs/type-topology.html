<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariadne — 全类型拓扑图</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --py: #3572A5;
    --orm: #6e40c9;
    --ts: #3178c6;
    --flow: #3fb950;
    --danger: #f85149;
    --warn: #d2991d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  header p { font-size: 13px; color: var(--muted); }

  .legend {
    display: flex; gap: 20px; padding: 12px 32px;
    border-bottom: 1px solid var(--border); font-size: 11px;
    flex-wrap: wrap; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-dot.py { background: var(--py); } .legend-dot.orm { background: var(--orm); } .legend-dot.ts { background: var(--ts); } .legend-dot.flow { background: var(--flow); }
  .legend-item.dimmed { opacity: 0.3; }

  .container { padding: 24px 32px; max-width: 1400px; }
  .section { margin-bottom: 40px; }
  .section-title {
    font-size: 15px; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

  .type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  .type-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: all 0.2s;
    cursor: default;
  }
  .type-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .type-card.highlight { border-color: var(--flow); box-shadow: 0 0 0 1px var(--flow); }

  .card-header {
    padding: 12px 14px; font-size: 12px; font-weight: 600; font-family: 'SF Mono', 'Menlo', monospace;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .card-header.py { border-left: 3px solid var(--py); }
  .card-header.orm { border-left: 3px solid var(--orm); }
  .card-header.ts { border-left: 3px solid var(--ts); }

  .card-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-badge.py { background: rgba(53,114,165,0.2); color: #58a6ff; }
  .card-badge.orm { background: rgba(110,64,201,0.2); color: #bc8cff; }
  .card-badge.ts { background: rgba(49,120,198,0.2); color: #79c0ff; }

  .card-body { padding: 10px 14px; font-size: 12px; }
  .field { display: flex; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
  .field:last-child { border-bottom: none; }
  .field-name { color: #79c0ff; font-family: 'SF Mono', monospace; min-width: 140px; font-size: 11px; }
  .field-type { color: var(--muted); font-size: 11px; flex: 1; }
  .field-desc { color: var(--muted); font-size: 10px; font-style: italic; margin-left: auto; text-align: right; }
  .field.related { background: rgba(63,185,80,0.05); }
  .field.related .field-name { color: var(--flow); }
  .field.related::before { content: '↳ '; color: var(--flow); font-size: 10px; }

  .card-usage {
    padding: 8px 14px; font-size: 10px; color: var(--muted);
    border-top: 1px solid var(--border);
  }
  .card-usage span { color: var(--text); }

  /* Flow arrows section */
  .flow-section { margin-bottom: 40px; }
  .flow-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px;
  }
  .flow-item {
    padding: 4px 10px; border-radius: 4px; font-family: 'SF Mono', monospace;
    font-size: 11px; white-space: nowrap;
  }
  .flow-arrow { color: var(--flow); font-weight: bold; font-size: 14px; }
  .flow-py { background: rgba(53,114,165,0.15); color: #58a6ff; }
  .flow-orm { background: rgba(110,64,201,0.15); color: #bc8cff; }
  .flow-ts { background: rgba(49,120,198,0.15); color: #79c0ff; }
  .flow-table { background: rgba(63,185,80,0.08); color: var(--flow); border: 1px solid rgba(63,185,80,0.2); }

  .mapping-row {
    display: grid; grid-template-columns: 1fr 40px 1fr 40px 1fr; gap: 8px;
    align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 12px;
  }
  .mapping-row.header { font-weight: 600; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .mapping-cell { font-family: 'SF Mono', monospace; font-size: 11px; }
  .mapping-cell.py { color: #58a6ff; }
  .mapping-cell.orm { color: #bc8cff; }
  .mapping-cell.ts { color: #79c0ff; }
  .mapping-arrow { text-align: center; color: var(--flow); font-size: 16px; }

  .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 8px 16px; font-size: 13px; border: none; background: none; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--flow); }

  .search-box {
    width: 320px; padding: 6px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; outline: none;
    float: right; margin-top: -4px;
  }
  .search-box:focus { border-color: var(--flow); }
  .search-box::placeholder { color: var(--muted); }

  .duplicate-badge {
    display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: rgba(248,81,73,0.15); color: var(--danger); margin-left: 6px;
  }

  @media (max-width: 768px) {
    .container { padding: 16px; }
    .type-grid { grid-template-columns: 1fr; }
    .mapping-row { grid-template-columns: 1fr; gap: 2px; }
    .mapping-arrow { transform: rotate(90deg); }
  }
</style>
</head>
<body>

<header>
  <h1>Ariadne — 全类型拓扑图</h1>
  <p>Python 后端类型 → ORM 数据库表 → TypeScript 前端类型 &nbsp;|&nbsp; 点击卡片查看映射关系</p>
</header>

<div class="legend" id="legend">
  <span style="font-size:11px;color:var(--muted);margin-right:8px;">筛选：</span>
  <div class="legend-item" data-layer="py"><span class="legend-dot py"></span> Python 类型</div>
  <div class="legend-item" data-layer="orm"><span class="legend-dot orm"></span> ORM 表</div>
  <div class="legend-item" data-layer="ts"><span class="legend-dot ts"></span> TS 前端类型</div>
  <div class="legend-item" data-layer="flow"><span class="legend-dot flow"></span> 映射关系</div>
  <span style="margin-left:auto;font-size:10px;color:var(--muted);"><span class="duplicate-badge">DUP</span> = 跨层重复类型</span>
</div>

<div class="container">

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="layers">按层查看</button>
    <button class="tab-btn" data-tab="mapping">字段映射表</button>
    <button class="tab-btn" data-tab="flows">数据流向</button>
  </div>

  <!-- Layer View -->
  <div id="tab-layers">

    <!-- Python Backend Types -->
    <div class="section" data-layer="py">
      <div class="section-title"><span class="section-dot" style="background:var(--py)"></span> 第一层：Python 后端内存类型（执行时使用，不落库）</div>
      <div class="type-grid" id="py-types"></div>
    </div>

    <!-- ORM Models -->
    <div class="section" data-layer="orm">
      <div class="section-title"><span class="section-dot" style="background:var(--orm)"></span> 第二层：ORM 数据库表（落库，SQLite）</div>
      <div class="type-grid" id="orm-types"></div>
    </div>

    <!-- TypeScript Frontend Types -->
    <div class="section" data-layer="ts">
      <div class="section-title"><span class="section-dot" style="background:var(--ts)"></span> 第三层：TypeScript 前端类型（API 返回 → UI 渲染）</div>
      <div class="type-grid" id="ts-types"></div>
    </div>

  </div>

  <!-- Mapping Table View -->
  <div id="tab-mapping" style="display:none;">
    <div class="section-title"><span class="section-dot" style="background:var(--flow)"></span> 跨层字段映射表</div>
    <div class="mapping-row header">
      <div>Python 类型.字段</div><div></div><div>ORM 列</div><div></div><div>TS 类型.字段</div>
    </div>
    <div id="mapping-table"></div>
  </div>

  <!-- Flow View -->
  <div id="tab-flows" style="display:none;">
    <div class="section">
      <div class="section-title"><span class="section-dot" style="background:var(--flow)"></span> 一次 run 的数据流向（以 write_file 为例）</div>
      <div id="flows-content"></div>
    </div>
  </div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const pyTypes = [
  { name: 'ChatMessage', file: 'core/types.py', fields: [
    { n:'role', t:'Literal["system","user","assistant","tool"]', d:'消息角色', dup:true },
    { n:'content', t:'str | None', d:'消息正文' },
    { n:'tool_calls', t:'list[ToolCall] | None', d:'工具调用请求' },
    { n:'tool_call_id', t:'str | None', d:'关联的工具调用 ID', dup:true },
  ], usage: '运行时上下文 + session_records.state_json', maps: ['AgentMessage'] },
  { name: 'ToolCall', file: 'core/types.py', fields: [
    { n:'id', t:'str', d:'模型分配的唯一 ID' },
    { n:'type', t:'Literal["function"]', d:'' },
    { n:'function', t:'ToolCallFunction', d:'' },
    { n:'function.name', t:'str', d:'工具名' },
    { n:'function.arguments', t:'str', d:'工具参数 JSON' },
  ], usage: 'ChatMessage.tool_calls 内嵌', maps: [] },
  { name: 'ToolResult', file: 'tools/result_types.py', fields: [
    { n:'ok', t:'bool', d:'执行是否成功', dup:true },
    { n:'content', t:'str | None', d:'给模型看的文本', dup:true },
    { n:'error', t:'ToolError | None', d:'失败时的错误结构', dup:true },
    { n:'metadata', t:'dict[str, Any]', d:'{state, path, bytes}', dup:true },
  ], usage: 'AgentEvent.tool_result + ChatMessage.content', maps: ['ToolResult (TS)'] },
  { name: 'ToolError', file: 'tools/result_types.py', fields: [
    { n:'ok', t:'bool = False', d:'' },
    { n:'code', t:'str', d:'错误码', dup:true },
    { n:'tool_name', t:'str', d:'工具名', dup:true },
    { n:'message', t:'str', d:'错误信息', dup:true },
  ], usage: 'ToolResult.error', maps: ['ToolError (TS)'] },
  { name: 'ToolState', file: 'tools/result_types.py', fields: [
    { n:'STAGED', t:'"staged"', d:'VFS 暂存，未落盘' },
    { n:'COMMITTED', t:'"committed"', d:'run 完成，VFS 已落盘' },
    { n:'ROLLED_BACK', t:'"rolled_back"', d:'run 取消/失败，VFS 已丢弃' },
  ], usage: 'ToolResult.metadata["state"]', maps: [] },
  { name: 'ToolDefinition', file: 'tools/types.py', fields: [
    { n:'name', t:'str', d:'工具注册名' },
    { n:'schema', t:'dict', d:'OpenAI function schema' },
    { n:'handler', t:'Callable', d:'执行函数' },
    { n:'risk_level', t:'RiskLevel', d:'安全等级' },
  ], usage: 'ToolRegistry 注册表', maps: [] },
  { name: 'AgentState', file: 'execution/runtime/types.py', fields: [
    { n:'messages', t:'list[ChatMessage]', d:'完整对话历史', dup:true },
    { n:'step', t:'int', d:'当前步骤号' },
    { n:'agent_name', t:'str | None', d:'Agent 名称' },
  ], usage: 'session_records.state_json', maps: ['SessionState'] },
  { name: 'AgentEvent', file: 'execution/runtime/types.py', fields: [
    { n:'index', t:'int', d:'事件序号', dup:true },
    { n:'type', t:'Literal[9种]', d:'事件类型', dup:true },
    { n:'content', t:'str | None', d:'事件文本', dup:true },
    { n:'tool_name', t:'str | None', d:'工具名', dup:true },
    { n:'tool_call_id', t:'str | None', d:'工具调用 ID', dup:true },
    { n:'tool_result', t:'ToolResult | None', d:'工具结果', dup:true },
  ], usage: 'session_run_events 表 + SSE agent_event 帧', maps: ['AgentEvent (TS)'] },
  { name: 'ToolTurnResult', file: 'execution/runtime/types.py', fields: [
    { n:'events', t:'list[AgentEvent]', d:'本轮产生的事件' },
    { n:'tool_messages', t:'list[ChatMessage]', d:'喂给模型的 tool 消息' },
    { n:'next_event_index', t:'int', d:'下个事件序号' },
    { n:'paused_for_approval', t:'bool', d:'是否审批挂起' },
  ], usage: 'tool_runner 产出，不落库', maps: [] },
  { name: 'RunFinalStatus', file: 'execution/persistence/types.py', fields: [
    { n:'COMPLETED', t:'"completed"', d:'正常结束' },
    { n:'PAUSED', t:'"paused"', d:'审批挂起' },
    { n:'CANCELLED', t:'"cancelled"', d:'用户主动取消' },
    { n:'FAILED', t:'"failed"', d:'网络/系统异常' },
  ], usage: 'session_runs.run_status', maps: ['TraceRunSummary.run_status (缺)'] },
  { name: 'RunFinalizationInput', file: 'execution/persistence/types.py', fields: [
    { n:'session_id', t:'str', d:'' },
    { n:'run_id', t:'str', d:'' },
    { n:'status', t:'RunFinalStatus', d:'终态枚举' },
    { n:'events', t:'list[AgentEvent]', d:'事件列表' },
    { n:'state', t:'AgentState', d:'终态快照' },
    { n:'append_events', t:'bool', d:'追加模式 / 新建模式' },
  ], usage: 'finalize_run() 入参，不落库', maps: [] },
  { name: 'ModelResponse', file: 'core/types.py', fields: [
    { n:'assistant_message', t:'ChatMessage', d:'助手回复' },
    { n:'status', t:'Literal[3种]', d:'完成状态' },
    { n:'usage', t:'ModelUsage | None', d:'token 用量' },
    { n:'error', t:'ModelError | None', d:'模型错误' },
  ], usage: 'AgentRunner 内部，不直接落库', maps: [] },
  { name: 'ModelStreamEvent', file: 'core/types.py', fields: [
    { n:'type', t:'str', d:'事件类型' },
    { n:'content_delta', t:'str | None', d:'文本增量' },
    { n:'thinking_delta', t:'str | None', d:'thinking 增量' },
    { n:'tool_call_id', t:'str | None', d:'' },
    { n:'finish_reason', t:'str | None', d:'' },
  ], usage: 'adapter → execution session，不落库', maps: [] },
];

const ormModels = [
  { name: 'SessionRecord', table: 'session_records', fields: [
    { n:'session_id', t:'String PK', d:'主键', maps:['SessionSummary.session_id'] },
    { n:'session_name', t:'String', d:'会话名', maps:['SessionSummary.session_name'] },
    { n:'state_json', t:'Text', d:'AgentState JSON ← 含所有 ChatMessage', maps:['SessionState'] },
    { n:'last_agent_name', t:'String', d:'最近 Agent', maps:['SessionSummary.last_agent_name'] },
    { n:'last_reply_preview', t:'String(120)', d:'回复摘要', maps:['SessionSummary.last_reply_preview'] },
    { n:'message_count', t:'Integer', d:'消息数', maps:['SessionSummary.message_count'] },
    { n:'workspace_path', t:'String', d:'工作区路径', maps:['SessionSummary.workspace_path'] },
    { n:'session_type', t:'String', d:'coding/assistant', maps:['SessionSummary.session_type'] },
  ], usage: 'session 列表 + 详情 API', dup: 'state_json 内嵌 ChatMessage，和 session_run_events 部分重叠' },
  { name: 'SessionRunRecord', table: 'session_runs', fields: [
    { n:'id', t:'Integer PK', d:'自增主键' },
    { n:'session_id', t:'String FK', d:'→ session_records' },
    { n:'run_id', t:'String UNIQUE', d:'业务主键', maps:['TraceRunSummary.run_id'] },
    { n:'run_status', t:'String', d:'completed/paused/cancelled/failed', maps:['⚠️ TS 类型缺此字段'] },
    { n:'parent_run_id', t:'String FK', d:'子 run 的父 run', maps:['TraceRunSummary.parent_run_id'] },
    { n:'user_input', t:'Text', d:'用户输入', maps:['TraceRunSummary.user_input'] },
    { n:'reply', t:'Text', d:'AI 回复', maps:['TraceRunSummary.reply'] },
    { n:'event_count', t:'Integer', d:'事件数', maps:['TraceRunSummary.event_count'] },
    { n:'is_active', t:'String', d:'1/0 活跃标记', maps:['TraceRunSummary.is_active'] },
  ], usage: 'Trace API (/trace) 返回 TraceRunSummary[]' },
  { name: 'SessionRunEventRecord', table: 'session_run_events', fields: [
    { n:'id', t:'Integer PK', d:'自增主键' },
    { n:'run_id', t:'String FK', d:'→ session_runs' },
    { n:'event_index', t:'Integer', d:'序号' },
    { n:'type', t:'String', d:'9种事件类型', maps:['AgentEvent.type'] },
    { n:'content', t:'Text', d:'事件文本', maps:['AgentEvent.content'] },
    { n:'tool_name', t:'String', d:'工具名', maps:['AgentEvent.tool_name'] },
    { n:'tool_call_id', t:'String', d:'LLM 分配 ID', maps:['AgentEvent.tool_call_id'] },
    { n:'tool_result_json', t:'Text', d:'ToolResult JSON', maps:['AgentEvent.tool_result'] },
  ], usage: 'AgentEvent 的逐行序列化存储' },
  { name: 'ToolCallRecord', table: 'tool_call_records', fields: [
    { n:'id', t:'Integer PK', d:'自增主键' },
    { n:'run_id', t:'String FK', d:'→ session_runs' },
    { n:'tool_name', t:'String', d:'工具名' },
    { n:'tool_call_id', t:'String', d:'LLM 分配 ID' },
    { n:'status', t:'String', d:'running/completed/failed/timeout/cancelled' },
    { n:'input_json', t:'Text', d:'工具入参' },
    { n:'result_json', t:'Text', d:'工具结果正文' },
  ], usage: 'Observer 侧写，前端暂不消费' },
  { name: 'PendingApproval', table: 'pending_approvals', fields: [
    { n:'id', t:'String PK', d:'UUID 审批单号' },
    { n:'session_id', t:'String', d:'关联 session' },
    { n:'run_id', t:'String', d:'关联 run' },
    { n:'batch_id', t:'String', d:'同一批 tool_calls' },
    { n:'tool_name', t:'String', d:'工具名' },
    { n:'arguments', t:'Text', d:'工具参数 JSON' },
    { n:'status', t:'String', d:'pending/approved/rejected' },
    { n:'saved_messages', t:'JSON', d:'审批时的上下文快照' },
  ], usage: '审批流程中间态存储' },
];

const tsTypes = [
  { name: 'AgentMessage', fields: [
    { n:'role', t:'string', d:'user/assistant/system/tool' },
    { n:'content', t:'string | null', d:'消息正文' },
    { n:'timeline?', t:'StreamingItem[]', d:'客户端专属：流式时间线' },
    { n:'stopped?', t:'boolean', d:'客户端专属：用户 Stop' },
    { n:'run_id?', t:'string', d:'客户端专属：关联 run ID' },
  ], usage: 'SessionState.messages — 渲染对话列表' },
  { name: 'AgentEvent', fields: [
    { n:'index', t:'number', d:'事件序号' },
    { n:'type', t:'8种字面量', d:'事件类型' },
    { n:'content?', t:'string', d:'事件文本' },
    { n:'tool_name?', t:'string', d:'工具名' },
    { n:'tool_call_id?', t:'string', d:'工具调用 ID' },
    { n:'tool_result?', t:'ToolResult', d:'工具结果 ⚠️ 含 metadata.state' },
  ], usage: 'TraceRunSummary.events + SSE agent_event 帧' },
  { name: 'ToolResult', fields: [
    { n:'ok', t:'boolean', d:'' },
    { n:'content?', t:'string', d:'' },
    { n:'error?', t:'ToolError', d:'' },
    { n:'metadata?', t:'Record<string,any>', d:'含 state/path/bytes' },
  ], usage: 'AgentEvent.tool_result' },
  { name: 'ToolError', fields: [
    { n:'code', t:'string', d:'' },
    { n:'tool_name', t:'string', d:'' },
    { n:'message', t:'string', d:'' },
  ], usage: 'ToolResult.error' },
  { name: 'SessionSummary', fields: [
    { n:'session_id', t:'string', d:'' },
    { n:'session_name?', t:'string', d:'' },
    { n:'message_count', t:'number', d:'' },
    { n:'last_reply_preview?', t:'string', d:'' },
    { n:'workspace_path?', t:'string', d:'' },
    { n:'session_type?', t:'"coding"|"assistant"', d:'' },
  ], usage: 'sidebar 会话列表 GET /sessions' },
  { name: 'SessionState', fields: [
    { n:'messages', t:'AgentMessage[]', d:'完整消息列表' },
  ], usage: 'SessionDetail.state — GET /sessions/:id' },
  { name: 'TraceRunSummary', fields: [
    { n:'run_id', t:'string', d:'' },
    { n:'session_id', t:'string', d:'' },
    { n:'parent_run_id?', t:'string', d:'' },
    { n:'agent_name?', t:'string', d:'' },
    { n:'user_input', t:'string', d:'' },
    { n:'reply', t:'string', d:'AI 回复' },
    { n:'event_count', t:'number', d:'' },
    { n:'events', t:'AgentEvent[]', d:'事件列表' },
    { n:'is_active?', t:'number', d:'1/0' },
    { n:'⚠️ run_status', t:'缺失!', d:'后端返回但前端未定义' },
  ], usage: 'TraceResponse.runs — GET /trace/:session_id' },
  { name: 'StreamFrame', fields: [
    { n:'type', t:'8种联合类型', d:'start|delta|thinking_delta|agent_event|end|error|paused|resume' },
    { n:'data (start)', t:'StreamStartData', d:'{session_id, run_id, agent_name}' },
    { n:'data (end)', t:'StreamEndData', d:'{reply, state, metadata}' },
    { n:'data (agent_event)', t:'AgentEvent', d:'实时事件' },
  ], usage: 'SSE /run/stream 实时流' },
  { name: 'StreamingItem', fields: [
    { n:'kind', t:'"text"|"thinking"|"event"', d:'客户端时间线项类型' },
    { n:'content / event', t:'string | AgentEvent', d:'实际数据' },
  ], usage: 'AgentMessage.timeline — 流式渲染后持久化' },
];

// ── Mapping data ──────────────────────────────────────────────────────────────
const mappingData = [
  { py:'ChatMessage', pyf:'role, content, tool_call_id', orm:'session_records.state_json (内嵌 JSON)', tst:'AgentMessage.role, .content' },
  { py:'AgentState', pyf:'messages', orm:'session_records.state_json (完整 AgentState)', tst:'SessionState.messages' },
  { py:'AgentEvent', pyf:'index, type, content, tool_name, tool_call_id, tool_result', orm:'session_run_events (一行一个)', tst:'AgentEvent (完全同名)' },
  { py:'ToolResult', pyf:'ok, content, error, metadata', orm:'session_run_events.tool_result_json (JSON 列)', tst:'ToolResult (完全同名)' },
  { py:'ToolError', pyf:'code, tool_name, message', orm:'tool_result_json 内嵌', tst:'ToolError (完全同名)' },
  { py:'RunFinalStatus', pyf:'COMPLETED/PAUSED/CANCELLED/FAILED', orm:'session_runs.run_status', tst:'⚠️ 缺失' },
  { py:'ToolCall', pyf:'id, function.name, function.arguments', orm:'tool_call_records (工具流水)', tst:'— (无直接映射)' },
  { py:'ModelStreamEvent', pyf:'type, content_delta, thinking_delta', orm:'— (不落库)', tst:'StreamFrame (部分对应)' },
  { py:'ToolState', pyf:'STAGED/COMMITTED/ROLLED_BACK', orm:'tool_result_json.metadata.state', tst:'ToolResult.metadata.state' },
];

// ── Flow data ─────────────────────────────────────────────────────────────────
const flowSteps = [
  { step:1, title:'用户发送 /run', items:[
    { layer:'py', text:'AgentInput { session_id, user_input }' },
    { layer:'arrow', text:'→' },
    { layer:'py', text:'RunExecutionSession.run()' },
  ]},
  { step:2, title:'Agent 决定调 write_file', items:[
    { layer:'py', text:'ToolCall { id, function: { name:"write_file", arguments } }' },
    { layer:'arrow', text:'→' },
    { layer:'py', text:'tool_runner.async_handle_tool_calls()' },
  ]},
  { step:3, title:'工具执行完成', items:[
    { layer:'py', text:'ToolResult { ok:true, content:"wrote src/a.py 128B", metadata:{state:"staged"} }' },
  ]},
  { step:4, title:'拆成两条路并行推进', items:[
    { layer:'flow', text:'┌─ ChatMessage(role="tool") → state.messages → 下轮推理喂给模型' },
    { layer:'flow', text:'└─ AgentEvent(type="tool_result") → events 列表 → 待落库' },
  ]},
  { step:5, title:'Agent 推理完毕', items:[
    { layer:'py', text:'RunExecutionSession 产出 FinalResultItem(status=COMPLETED)' },
  ]},
  { step:6, title:'终态落库 — finalize_run(COMPLETED)', items:[
    { layer:'orm', text:'_finalize_completed: staged → committed' },
    { layer:'orm', text:'├─ session_runs : UPDATE run_status="completed", reply="..."' },
    { layer:'orm', text:'├─ session_run_events : INSERT 每条 AgentEvent (tool_result_json 含 state:"committed")' },
    { layer:'orm', text:'├─ session_records : UPDATE state_json (最新 AgentState)' },
    { layer:'orm', text:'└─ RunVfsRegistry.commit_all() : VFS → 磁盘' },
  ]},
  { step:7, title:'SSE 实时推送给前端', items:[
    { layer:'ts', text:'start 帧 → delta 帧... → agent_event 帧 → end 帧' },
    { layer:'ts', text:'StreamingItem[] 存入 AgentMessage.timeline' },
  ]},
  { step:8, title:'前端历史加载', items:[
    { layer:'ts', text:'GET /trace/:session_id → TraceRunSummary[]' },
    { layer:'ts', text:'TraceRunSummary.events: AgentEvent[] (含 tool_result.metadata.state)' },
    { layer:'ts', text:'ToolTree.vue → ToolCard.vue 渲染 staged/committed/rolled_back 徽章' },
  ]},
  { step:9, title:'如果是取消或失败', items:[
    { layer:'orm', text:'_finalize_interrupted(CANCELLED/FAILED): staged → rolled_back' },
    { layer:'orm', text:'RunVfsRegistry.discard() : VFS 暂存丢弃' },
    { layer:'orm', text:'session_run_events 中的 tool_result_json = {state:"rolled_back"}' },
  ]},
];

// ── Render ────────────────────────────────────────────────────────────────────
function buildCard(type, layer, data) {
  const badge = {py:'Python', orm:'ORM Table', ts:'TypeScript'}[layer];
  const badgeClass = layer;
  const dup = data.dup ? `<span class="duplicate-badge">DUP: ${data.dup}</span>` : '';
  const maps = data.maps?.length ? `<span style="color:var(--flow);margin-left:8px;">→ ${data.maps.join(', ')}</span>` : '';

  let fieldsHtml = data.fields.map(f => {
    const rel = f.dup ? ' related' : '';
    return `<div class="field${rel}"><span class="field-name">${f.n}</span><span class="field-type">${f.t}</span><span class="field-desc">${f.d || ''}${f.maps ? ' → ' + f.maps.join(', ') : ''}</span></div>`;
  }).join('');

  return `
    <div class="type-card" data-type="${data.name}" data-layer="${layer}">
      <div class="card-header ${badgeClass}">
        <span>${data.name}${data.table ? ' <span style="color:var(--muted);font-weight:400">['+data.table+']</span>' : ''}${data.file ? ' <span style="color:var(--muted);font-weight:400">['+data.file+']</span>' : ''}</span>
        <span class="card-badge ${badgeClass}">${badge}</span>
      </div>
      <div class="card-body">${fieldsHtml}</div>
      <div class="card-usage">
        ${data.usage ? '📌 ' + data.usage : ''}${maps}${dup}
      </div>
    </div>`;
}

document.getElementById('py-types').innerHTML = pyTypes.map(d => buildCard('py', 'py', d)).join('');
document.getElementById('orm-types').innerHTML = ormModels.map(d => buildCard('orm', 'orm', d)).join('');
document.getElementById('ts-types').innerHTML = tsTypes.map(d => buildCard('ts', 'ts', d)).join('');

// Mapping table
document.getElementById('mapping-table').innerHTML = mappingData.map(m => `
  <div class="mapping-row">
    <div><div class="mapping-cell py" style="font-weight:600">${m.py}</div><div style="font-size:10px;color:var(--muted)">${m.pyf}</div></div>
    <div class="mapping-arrow">→</div>
    <div class="mapping-cell orm">${m.orm}</div>
    <div class="mapping-arrow">→</div>
    <div class="mapping-cell ts">${m.tst}</div>
  </div>
`).join('');

// Flows
document.getElementById('flows-content').innerHTML = flowSteps.map(s => `
  <div style="margin-bottom:16px">
    <div style="font-weight:600;color:var(--flow);margin-bottom:6px;font-size:13px">Step ${s.step}: ${s.title}</div>
    <div style="padding-left:16px">
      ${s.items.map(i => {
        const cls = i.layer === 'py' ? 'flow-py' : i.layer === 'orm' ? 'flow-orm' : i.layer === 'ts' ? 'flow-ts' : i.layer === 'arrow' ? '' : 'flow-table';
        if (i.layer === 'arrow') return `<span class="flow-arrow">${i.text}</span>`;
        return `<div class="flow-row"><span class="flow-item ${cls}">${i.text}</span></div>`;
      }).join('')}
    </div>
  </div>
`).join('');

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-layers').style.display = btn.dataset.tab === 'layers' ? 'block' : 'none';
    document.getElementById('tab-mapping').style.display = btn.dataset.tab === 'mapping' ? 'block' : 'none';
    document.getElementById('tab-flows').style.display = btn.dataset.tab === 'flows' ? 'block' : 'none';
  });
});

// ── Legend click to filter ────────────────────────────────────────────────────
let activeFilter = null;
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const layer = item.dataset.layer;
    if (activeFilter === layer) {
      activeFilter = null;
      document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('dimmed'));
      document.querySelectorAll('[data-layer]').forEach(el => { el.style.opacity = ''; el.style.display = ''; });
    } else {
      activeFilter = layer;
      document.querySelectorAll('.legend-item').forEach(i => i.classList.toggle('dimmed', i.dataset.layer !== layer));
      document.querySelectorAll('[data-layer]').forEach(el => {
        el.style.opacity = el.dataset.layer === layer ? '' : '0.2';
      });
    }
  });
});

// ── Click card to highlight mappings ──────────────────────────────────────────
document.querySelectorAll('.type-card').forEach(card => {
  card.addEventListener('click', function() {
    const typeName = this.dataset.type;
    const wasHighlight = this.classList.contains('highlight');
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('highlight'));
    if (!wasHighlight) {
      this.classList.add('highlight');
      this.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
});
</script>

</body>
</html>
