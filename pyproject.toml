[tool.black]
line-length = 100
target-version = ["py39"]
extend-exclude = '''
/(
  \.git
  | \.venv
  | frontend/dist
  | alembic/.*/__pycache__
  | .*/__pycache__
)/
'''

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = [
  ".git",
  ".venv",
  "frontend/dist",
  "**/__pycache__",
]
src = ["agent_prototype"]

[tool.ruff.lint]
select = ["E9", "F", "B"]
ignore = ["B008"]
